[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 60

[[services]]
name = "wordpress"

[services.variables]
WP_SITE_TITLE   = "London Pentecostal Church"
WP_ADMIN_USER   = "lpcadmin"
WP_DEBUG        = "false"
