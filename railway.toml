[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "/entrypoint.sh"

[[services]]
name = "wordpress"

[services.variables]
PORT                = "80"
WP_SITE_TITLE       = "London Pentecostal Church"
WP_ADMIN_USER       = "lpcadmin"
WP_ADMIN_PASSWORD   = "Ch@ngeMe2026!"
WP_ADMIN_EMAIL      = "admin@londonpentecostalchurch.org"
WP_DEBUG            = "false"
# MySQL credentials are auto-injected by Railway's MySQL plugin
# Do NOT hardcode these - they will be provided at runtime by the plugin
